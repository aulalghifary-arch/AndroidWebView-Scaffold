function renderKomponenKalenderKustom() {
    const namaBulanIndo = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    const thn = kalenderTanggalNavigasiGlobal.getFullYear();
    const bln = kalenderTanggalNavigasiGlobal.getMonth();
    
    document.getElementById('calendar-current-month-year').innerText = namaBulanIndo[bln] + " " + thn;
    const tglPertamaBulan = new Date(thn, bln, 1);
    const hariPertamaIndex = tglPertamaBulan.getDay();
    const jumlahHariBulanIni = new Date(thn, bln + 1, 0).getDate();
    let containerSel = document.getElementById('calendar-date-cells-target');
    containerSel.innerHTML = "";
    
    for (let i = 0; i < hariPertamaIndex; i++) {
        containerSel.innerHTML += `<div class="calendar-cell-date empty"></div>`;
    }
    
    let stringTanggalTerpilihSekarang = document.getElementById(targetInputIdKalenderGlobal).value;
    for (let d = 1; d <= jumlahHariBulanIni; d++) {
        let padD = String(d).padStart(2, '0');
        let padM = String(bln + 1).padStart(2, '0');
        let formatLoopYMD = `${thn}-${padM}-${padD}`;
        
        let kelasTambahanTerpilih = (formatLoopYMD === stringTanggalTerpilihSekarang) ? "selected-day" : "";
        
        containerSel.innerHTML += `<div class="calendar-cell-date ${kelasTambahanTerpilih}" onclick="pilihTanggalDariKalenderKustom('${formatLoopYMD}')">${d}</div>`;
    }
}

function tambahKategoriBaruOtomatis(jenis) {
    document.getElementById('dropdown-list-utama').classList.remove('open');
    customSwal().fire({
        title: 'Kategori Baru',
        text: `Ketikkan nama kategori kustom (${jenis.toUpperCase()}):`,
        input: 'text',
        inputPlaceholder: 'Nama kategori...',
        showCancelButton: true,
        confirmButtonText: 'Simpan'
    }).then((res) => {
        if(res.isConfirmed && res.value) {
            let namaClean = res.value.trim();
            if(!namaClean) return;
            if(jenis === 'masuk') {
                if(!dbKategoriMasuk.includes(namaClean)) dbKategoriMasuk.push(namaClean);
                localStorage.setItem('aul_kat_masuk', JSON.stringify(dbKategoriMasuk));
            } else {
                if(!dbKategoriKeluar.includes(namaClean)) dbKategoriKeluar.push(namaClean);
                localStorage.setItem('aul_kat_keluar', JSON.stringify(dbKategoriKeluar));
            }
            sesuaikanKategori();
            pilihKategoriKustom('utama', namaClean);
            customSwal().fire('Berhasil', 'Kategori kustom ditambahkan!', 'success');
        }
    });
}

function muatDatabaseLokal() {
    let tMasuk = localStorage.getItem('aul_kat_masuk');
    let tKeluar = localStorage.getItem('aul_kat_keluar');
    if(tMasuk) dbKategoriMasuk = JSON.parse(tMasuk);
    if(tKeluar) dbKategoriKeluar = JSON.parse(tKeluar);

    let tTx = localStorage.getItem('aul_kas_transaksi');
    let tHt = localStorage.getItem('aul_kas_hutang');
    if(tTx) dbTransaksi = JSON.parse(tTx);
    if(tHt) dbHutang = JSON.parse(tHt);

    let tDompet = localStorage.getItem('aul_kas_dompet_aktif');
    if(tDompet) dompetAktif = tDompet;

    let tTema = localStorage.getItem('tema_buku_kas');
    if(tTema === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('theme-color-meta').content = "#121212";
    }
}

    localStorage.setItem('aul_kas_dompet_aktif', dompetAktif);
}

function perbaruiSemuaData() {
    sinkronKeLocalStorage();
    let totalMasukFilter = 0;
    let totalKeluarFilter = 0;
    let totalMasukSemuaDompetAktif = 0;
    let totalKeluarSemuaDompetAktif = 0;
    let saldoPerDompet = {
        "Dompet Utama": 0, "BSI": 0, "DANA": 0, "GoPay": 0, "OVO": 0, "Tunai": 0
    };
    dbTransaksi.forEach(t => {
        let namaDompet = t.dompet || "Dompet Utama";
        if (!saldoPerDompet[namaDompet]) { saldoPerDompet[namaDompet] = 0; }
        if (t.jenis === 'masuk') { saldoPerDompet[namaDompet] += t.jumlah; }
        if (t.jenis === 'keluar') { saldoPerDompet[namaDompet] -= t.jumlah; }
    });
    if (!saldoPerDompet[dompetAktif]) { saldoPerDompet[dompetAktif] = 0; }

    dbTransaksi.forEach(t => {
        let namaDompet = t.dompet || "Dompet Utama";
        if (namaDompet === dompetAktif) {
            if (t.jenis === 'masuk') totalMasukSemuaDompetAktif += t.jumlah;
            if (t.jenis === 'keluar') totalKeluarSemuaDompetAktif += t.jumlah;
            
            if (cekKessesuaianWaktu(t.tanggal, filterUtamaAktif)) {
                if (t.jenis === 'masuk') totalMasukFilter += t.jumlah;
                if (t.jenis === 'keluar') totalKeluarFilter += t.jumlah;
            }
        }
    });
    
    document.getElementById('lbl-saldo-utama').innerText = `Saldo ${dompetAktif} ↗ (Ketuk Ganti Dompet)`;
    document.getElementById('total-pemasukan').innerText = formatRupiah(totalMasukFilter);
    document.getElementById('total-pengeluaran').innerText = formatRupiah(totalKeluarFilter);
    
    let selisihSaldoDompetAktif = totalMasukSemuaDompetAktif - totalKeluarSemuaDompetAktif;
    document.getElementById('total-saldo').innerText = formatRupiah(selisihSaldoDompetAktif);
    document.getElementById('md-total-saldo').innerText = formatRupiah(saldoPerDompet[dompetAktif]);
    document.getElementById('md-lbl-dompet-aktif').innerText = `SALDO AKTIF: ${dompetAktif.toUpperCase()}`;

    let modalDaftarDompet = document.getElementById('md-daftar-per-dompet');
    let datalistDompet = document.getElementById('list-dompet-tersimpan');
    modalDaftarDompet.innerHTML = "";
    datalistDompet.innerHTML = "";

    let listNamaDompet = Object.keys(saldoPerDompet);
    let selectDari = document.getElementById('trf-dari');
    let selectKe = document.getElementById('trf-ke');
    let selectCariDompet = document.getElementById('cari-dompet');

    if (selectCariDompet) {
        let dompetSebelum = selectCariDompet.value;
        selectCariDompet.innerHTML = '<option value="semua">Semua Buku Kas</option>';
        listNamaDompet.forEach(d => {
            selectCariDompet.innerHTML += `<option value="${d}">${d}</option>`;
        });
        selectCariDompet.value = listNamaDompet.includes(dompetSebelum) ? dompetSebelum : "semua";
    }

    if (selectDari && selectKe) {
        let opsiDariSblm = selectDari.value;
        let opsiKeSblm = selectKe.value;
        selectDari.innerHTML = "";
        selectKe.innerHTML = "";
        listNamaDompet.forEach(d => {
            selectDari.innerHTML += `<option value="${d}">${d}</option>`;
            selectKe.innerHTML += `<option value="${d}">${d}</option>`;
        });
        if(opsiDariSblm && listNamaDompet.includes(opsiDariSblm)) selectDari.value = opsiDariSblm;
        if(opsiKeSblm && listNamaDompet.includes(opsiKeSblm)) selectKe.value = opsiKeSblm;
    }

    listNamaDompet.forEach(d => {
        let opt = document.createElement('option');
        opt.value = d;
        datalistDompet.appendChild(opt);
        
        let sld = saldoPerDompet[d] || 0;
        let styleWarna = sld >= 0 ? 'var(--success)' : 'var(--danger)';
        let styleAktif = (d === dompetAktif) ? 'background: rgba(52, 152, 219, 0.15); border-left: 4px solid var(--primary);' : '';
        
        modalDaftarDompet.innerHTML += `
        <div onclick="gantiDompetAktif('${d}')" style="display:flex; justify-content:space-between; align-items:center; padding:12px 10px; border-bottom:1px solid var(--border-color); font-size:13px; cursor:pointer; ${styleAktif}">
            <span style="font-weight:600;">💳 ${d} ${d === dompetAktif ? '✅' : ''}</span>
            <span style="font-weight:bold; color:${styleWarna};">${formatRupiah(sld)}</span>
        </div>`;
    });
    
    modalDaftarDompet.innerHTML += `
    <div style="padding: 12px 10px; display: flex; gap: 8px; background: var(--bg-color); border-top: 1px solid var(--border-color);">
        <input type="text" id="new-wallet-name" placeholder="Tambah E-Wallet/Dompet baru..." style="padding: 6px; font-size: 12px; width: 65%;">
        <button type="button" onclick="tambahDompetBaru()" class="btn btn-primary" style="width: 35%; padding: 6px; font-size: 12px;">+ Buat</button>
    </div> `;
    
    tampilkanRiwayatUtama();
    tampilkanRiwayatLaporan();
    tampilkanDaftarHutang();
    perbaruiGrafikDompet();
    
    // INI KUNCI SINKRONISASI KE SUPABASE
    kirimDataKeCloudSupabase();
}

function cekKessesuaianWaktu(itemTanggal, filterId) {
    let tglData = new Date(itemTanggal);
    let tglSekarang = new Date();
    
    if (filterId === 'hari-ini') return tglData.toDateString() === tglSekarang.toDateString();
    if (filterId === 'kemarin') {
        let kemrn = new Date();
        kemrn.setDate(tglSekarang.getDate() - 1);
        return tglData.toDateString() === kemrn.toDateString();
    }
    if (filterId === 'bulan-ini') {
        return tglData.getMonth() === tglSekarang.getMonth() && tglData.getFullYear() === tglSekarang.getFullYear();
    }
    return true;
}

    dompetAktif = namaBaru;

    customSwal().fire('Sukses', `Dompet kustom "${namaBaru}" berhasil diaktifkan!`, 'success');
}

function gantiDompetAktif(namaDompet) {
    dompetAktif = namaDompet;
    perbaruiSemuaData();
    tutupModalDompet();
}

function simpanTransaksi(e) {
    e.preventDefault();
    let tgl = document.getElementById('tx-tanggal').value;
    let jam = document.getElementById('tx-jam').value;
    let jenis = document.getElementById('tx-jenis').value;
    let kat = document.getElementById('dropdown-val-utama').innerText;
    let jml = parseFloat(document.getElementById('tx-jumlah').value);
    
    if(kat === "Pilih Kategori..." || !kat) {
        customSwal().fire('Peringatan', 'Silakan pilih kategori transaksi dahulu!', 'warning');
        return;
    }

    let itemBaru = {
        id: "tx_" + Date.now() + "_" + Math.random().toString(36).substr(2, 4),
        tanggal: tgl,
        jam: jam || "00:00",
        jenis: jenis,
        kategori: kat,
        dompet: dompetAktif,
        jumlah: jml
    };
    
    dbTransaksi.unshift(itemBaru);
    document.getElementById('tx-jumlah').value = "";
    perbaruiSemuaData();
    sesuaikanWaktuOtomatis();
}

function tampilkanRiwayatUtama() {
    let container = document.getElementById('list-utama');
    let containerTabs = document.getElementById('tabs-utama');
    let listFilter = [
        {id: "semua-riwayat", label: "Semua Kas"},
        {id: "hari-ini", label: "Hari Ini"},
        {id: "kemarin", label: "Kemarin"},
        {id: "bulan-ini", label: "Bulan Ini"}
    ];
    
    containerTabs.innerHTML = "";
    listFilter.forEach(f => {
        let aktifClass = (f.id === filterUtamaAktif) ? "active" : "";
        containerTabs.innerHTML += `<div class="tab-item ${aktifClass}" onclick="gantiFilterUtama('${f.id}')">${f.label}</div>`;
    });
    
    container.innerHTML = "";
    let filtered = dbTransaksi.filter(t => (t.dompet || "Dompet Utama") === dompetAktif && cekKessesuaianWaktu(t.tanggal, filterUtamaAktif));
    if(filtered.length === 0) {
        container.innerHTML = `<p style="text-align:center; padding:20px; opacity:0.6; font-size:12px;">Tidak ada riwayat transaksi pada filter ini</p>`;
        return;
    }

    filtered.forEach(t => {
        let tanda = (t.jenis === 'masuk') ? "+" : "-";
        let kelasWarna = (t.jenis === 'masuk') ? "txt-masuk" : "txt-keluar";
        
        container.innerHTML += `
        <div class="item-transaksi" onclick="bukaModalAksiTransaksi('${t.id}')">
            <div class="item-left">
                <span class="item-name">${t.kategori}</span>
                <span class="item-date">📅 ${formatTanggalIndo(t.tanggal)} &nbsp;🕒 ${t.jam || '00:00'}</span>
            </div>
            <div class="item-right ${kelasWarna}">${tanda} ${formatRupiah(t.jumlah)}</div>
            <div class="item-actions">
                <button class="btn-icon">⚙️</button>
            </div>
        </div>`;
    });

function tampilkanRiwayatLaporan() {
    if(document.getElementById('page-laporan').style.display === 'none' && !document.getElementById('page-laporan').classList.contains('active')) return;
    
    let titleEl = document.getElementById('laporan-title');
    let cardBg = document.getElementById('laporan-card-bg');
    let cardLbl = document.getElementById('laporan-card-lbl');
    let cardVal = document.getElementById('laporan-card-total');
    let tabsContainer = document.getElementById('tabs-laporan');
    let listContainer = document.getElementById('list-laporan');
    
    titleEl.innerText = (jenisLaporanAktif === 'masuk') ? "Analisa Pemasukan" : "Analisa Pengeluaran";
    cardLbl.innerText = (jenisLaporanAktif === 'masuk') ? "TOTAL PEMASUKAN" : "TOTAL PENGELUARAN";
    
    if(jenisLaporanAktif === 'masuk') {
        cardBg.className = "dash-card card-large bg-masuk";
    } else {
        cardBg.className = "dash-card card-large bg-keluar";
    }

    let filterKategoriTersedia = ["semua-kategori"];
    let hitungTotalMutasiLaporan = 0;
    
    dbTransaksi.forEach(t => {
        if((t.dompet || "Dompet Utama") === dompetAktif && t.jenis === jenisLaporanAktif) {
            hitungTotalMutasiLaporan += t.jumlah;
            if(!filterKategoriTersedia.includes(t.kategori)) {
                filterKategoriTersedia.push(t.kategori);
            }
        }
    });
    cardVal.innerText = formatRupiah(hitungTotalMutasiLaporan);

    tabsContainer.innerHTML = "";
    filterKategoriTersedia.forEach(kat => {
        let labelTampil = (kat === "semua-kategori") ? "Semua Transaksi" : kat;
        let classAktif = (kat === kategoriLaporanAktif) ? "active" : "";
        tabsContainer.innerHTML += `<div class="tab-item ${classAktif}" onclick="gantiKategoriLaporan('${kat}')">${labelTampil}</div>`;
    });
    
    listContainer.innerHTML = "";
    let dataTerfilterLaporan = dbTransaksi.filter(t => {
        let cocokDompet = (t.dompet || "Dompet Utama") === dompetAktif;
        let cocokJenis = t.jenis === jenisLaporanAktif;
        let cocokKategori = (kategoriLaporanAktif === "semua-kategori") || (t.kategori === kategoriLaporanAktif);
        return cocokDompet && cocokJenis && cocokKategori;
    });
    
    if(dataTerfilterLaporan.length === 0) {
        listContainer.innerHTML = `<p style="text-align:center; padding:30px; opacity:0.6; font-size:12px;">Tidak ditemukan data mutasi</p>`;
        return;
    }

    dataTerfilterLaporan.forEach(t => {
        let tanda = (t.jenis === 'masuk') ? "+" : "-";
        let kelasWarna = (t.jenis === 'masuk') ? "txt-masuk" : "txt-keluar";
        listContainer.innerHTML += `
        <div class="item-transaksi" onclick="bukaModalAksiTransaksi('${t.id}')">
            <div class="item-left">
                <span class="item-name">${t.kategori}</span>
                <span class="item-date">📅 ${formatTanggalIndo(t.tanggal)} &nbsp;🕒 ${t.jam || '00:00'}</span>
            </div>
            <div class="item-right ${kelasWarna}">${tanda} ${formatRupiah(t.jumlah)}</div>
        </div>`;
    });
}

function gantiKategoriLaporan(kat) { kategoriLaporanAktif = kat; tampilkanRiwayatLaporan(); }

function perbaruiGrafikDompet() {
    let container = document.getElementById('list-utama');
    if(!container) return;
    
    let existingChart = document.getElementById('chart-dashboard-kustom');
    if(existingChart) existingChart.remove();

    let hitungMasuk = 0;
    let hitungKeluar = 0;
    dbTransaksi.forEach(t => {
        if((t.dompet || "Dompet Utama") === dompetAktif && cekKessesuaianWaktu(t.tanggal, filterUtamaAktif)) {
            if(t.jenis === 'masuk') hitungMasuk += t.jumlah;
            if(t.jenis === 'keluar') hitungKeluar += t.jumlah;
        }
    });
    
    if(hitungMasuk === 0 && hitungKeluar === 0) return;

    let maks = Math.max(hitungMasuk, hitungKeluar, 1);
    let pctMasuk = (hitungMasuk / maks) * 100;
    let pctKeluar = (hitungKeluar / maks) * 100;
    
    let chartHTML = `
    <div id="chart-dashboard-kustom" style="margin-top:15px;">
        <div class="chart-container">
            <div class="chart-bar-wrapper">
                <span class="chart-val txt-masuk">${formatRupiah(hitungMasuk)}</span>
                <div class="chart-bar bar-masuk" style="height: ${pctMasuk}%"></div>
                <span class="chart-label">Pemasukan</span>
            </div>
            <div class="chart-bar-wrapper">
                <span class="chart-val txt-keluar">${formatRupiah(hitungKeluar)}</span>
                <div class="chart-bar bar-keluar" style="height: ${pctKeluar}%"></div>
                <span class="chart-label">Pengeluaran</span>
            </div>
        </div>
    </div>`;
    container.insertAdjacentHTML('beforebegin', chartHTML);
}

function prosesSimpanCicilan(e) {
    e.preventDefault();
    if(!idHutangTerpilih) return;
    let item = dbHutang.find(h => h.id === idHutangTerpilih);
    if(!item) return;

    let tanggalCicilan = document.getElementById('cc-tanggal').value;
    let nominalCicilan = parseFloat(document.getElementById('cc-nominal').value);
    let sisaLama = item.nominal - (item.terbayar || 0);

    if(nominalCicilan > sisaLama) {
        customSwal().fire('Error', 'Nominal pembayaran melebihi sisa tunggakan!', 'error');
        return;
    }

    item.terbayar = (item.terbayar || 0) + nominalCicilan;
    if(item.terbayar >= item.nominal) item.status = "lunas";

    dbHutang = dbHutang.map(h => (h.id === item.id) ? item : h);
    
    let jenisKas = (item.jenis === 'hutang') ? 'keluar' : 'masuk';
    let ketKategori = (item.jenis === 'hutang') ? 'Bayar Cicilan Hutang (-)' : 'Angsuran Piutang Masuk (+)';

    let txCicilan = {
        id: "tx_cc_auto_" + Date.now(),
        tanggal: tanggalCicilan,
        jam: "00:00",
        jenis: jenisKas,
        kategori: ketKategori + " [" + item.nama + "]",
        dompet: dompetAktif,
        jumlah: nominalCicilan
    };
    dbTransaksi.unshift(txCicilan);

    perbaruiSemuaData();
    tutupModalCicilan();
    customSwal().fire('Berhasil', `Sukses mencatat cicilan sebesar ${formatRupiah(nominalCicilan)} pada tanggal ${formatTanggalIndo(tanggalCicilan)}.`, 'success');
}

async function cekSesiLogin() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    sessionUserGlobal = session ? session.user : null;
    
    if (sessionUserGlobal) {
        document.getElementById('page-auth').style.display = 'none';
        await ambilDataDariCloudSupabase();
    } else {
        document.getElementById('page-auth').style.display = 'flex';
    }
}

async function handleLogin() {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    if(!email || !password) return customSwal().fire('Gagal', 'Isi email dan password!', 'warning');

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) customSwal().fire('Gagal', 'Gagal: ' + error.message, 'error');
    else cekSesiLogin();
}

async function handleRegister() {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    if(!email || !password) return customSwal().fire('Gagal', 'Isi email dan password!', 'warning');

    const { error } = await supabaseClient.auth.signUp({ email, password });
    if (error) customSwal().fire('Gagal', 'Gagal Daftar: ' + error.message, 'error');
    else customSwal().fire('Sukses', 'Sukses mendaftar! Silakan klik tombol Masuk.', 'success');
}

async function handleLogout() {
    customSwal().fire({
        title: 'Keluar Akun?',
        text: 'Apakah Anda yakin ingin keluar dari akun Buku Kas ini?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Ya, Keluar',
        cancelButtonText: 'Batal'
    }).then(async (result) => {
        if (result.isConfirmed) {
            const { error } = await supabaseClient.auth.signOut();
            if (error) {
                customSwal().fire('Gagal Keluar', error.message, 'error');
            } else {
                bukaHalaman('page-utama');
                cekSesiLogin();
            }
        }
    });
}

async function ambilDataDariCloudSupabase() {
    if (!sessionUserGlobal) return;
    try {
        lockCloudSyncGlobal = true;
        const { data, error } = await supabaseClient
            .from('buku_kas_cloud')
            .select('payload_data')
            .eq('user_id', sessionUserGlobal.id)
            .maybeSingle();
            
        if (error) throw error;

        if (data && data.payload_data) {
            let p = data.payload_data;
            if(p.transaksi) dbTransaksi = p.transaksi;
            if(p.hutang) dbHutang = p.hutang;
            if(p.kategori_masuk) dbKategoriMasuk = p.kategori_masuk;
            if(p.kategori_keluar) dbKategoriKeluar = p.kategori_keluar;
        }
    } catch (err) {
        console.error("Cloud down, menggunakan database offline: ", err.message);
    } finally {
        lockCloudSyncGlobal = false;
        perbaruiSemuaData();
        sesuaikanKategori();
    }
}

async function kirimDataKeCloudSupabase() {
    if (!sessionUserGlobal || lockCloudSyncGlobal) return;
    try {
        let paket = {
            transaksi: dbTransaksi,
            hutang: dbHutang,
            kategori_masuk: dbKategoriMasuk,
            kategori_keluar: dbKategoriKeluar,
            last_sync: new Date().toISOString()
        };
        
        await supabaseClient
            .from('buku_kas_cloud')
            .upsert({ 
                user_id: sessionUserGlobal.id, 
                payload_data: paket,
                updated_at: new Date().toISOString()
            }, { onConflict: 'user_id' });
            
    } catch (e) {
        console.warn("Sinkronisasi tertunda karena koneksi terputus.");
    }
}

// Inisialisasi awal saat aplikasi dimuat
window.addEventListener('DOMContentLoaded', () => {
    muatDatabaseLokal();
    sesuaikanWaktuOtomatis();
    sesuaikanKategori();
    perbaruiSemuaData();
    cekSesiLogin();
});
</script>
